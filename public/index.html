<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy AI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>📜 Policy AI</h1>
        <p>Track and understand federal legislation with transparent AI assistance</p>
    </header>

    <main>
        <!-- SECTION 1: Bills List View (shown by default) -->
        <section id="bills-section">
            <h2>Recent Federal Bills</h2>
            <button id="refresh-btn">🔄 Refresh Bills</button>
            <div id="bills-list" class="bills-container">
                <p>Loading bills...</p>
            </div>
        </section>

        <!-- SECTION 2: Bill Detail View (hidden by default) -->
        <section id="detail-section" style="display: none;">
            <button id="back-btn">← Back to List</button>
            <div id="bill-detail"></div>
            <button id="interpret-btn" class="primary-btn">🤖 Ask AI</button>
            <div id="ai-interpretation"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
